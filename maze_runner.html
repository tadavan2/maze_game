<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maze Racer!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
  }
  h1 {
    color: #e94560;
    font-size: 2.5rem;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
  }
  #stats {
    color: #eee;
    font-size: 1.2rem;
    margin-bottom: 10px;
    display: flex;
    gap: 30px;
  }
  #stats span { color: #f5c518; font-weight: bold; }
  canvas {
    border: 3px solid #e94560;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
  }
  #message {
    color: #f5c518;
    font-size: 1.5rem;
    margin-top: 15px;
    height: 40px;
    text-shadow: 0 0 10px rgba(245, 197, 24, 0.5);
  }
  #instructions {
    color: #aaa;
    font-size: 0.95rem;
    margin-top: 8px;
  }
</style>
</head>
<body>

<h1>🏎️ Maze Racer!</h1>
<div id="stats">
  Level: <span id="level">1</span> &nbsp;|&nbsp; Stars: <span id="stars">0</span> &nbsp;|&nbsp; Time: <span id="timer">0s</span> &nbsp;|&nbsp; Best: <span id="best">--</span>
</div>
<canvas id="game" width="540" height="540"></canvas>
<div id="message"></div>
<div id="instructions">Use arrow keys or WASD to drive. Hold them down to go faster! Hit orange boost pads for TURBO!</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const msgEl = document.getElementById('message');
const levelEl = document.getElementById('level');
const starsEl = document.getElementById('stars');
const timerEl = document.getElementById('timer');
const bestEl = document.getElementById('best');

// --- Dynamic maze size (grows with level!) ---
function getMazeSize() {
  // Start at 11, grow by 2 each level, max 25
  return Math.min(25, 11 + (level - 1) * 2);
}

let COLS, ROWS, CELL;
function updateGridSize() {
  COLS = getMazeSize();
  ROWS = COLS;
  CELL = canvas.width / COLS;
}

let maze = [];
let player = { x: 0, y: 0, facing: 'right' };
let exit = {};
let stars = [];
let boostPads = [];
let starCount = 0;
let level = 1;
let startTime = 0;
let timerInterval = null;
let won = false;
let particles = [];
let playerTrail = [];
let floatingTexts = [];
let countdown = 0; // 3, 2, 1, 0=GO, -1=playing
let countdownTimer = null;
let bestTimes = {};
let checkeredFlag = false;
let checkeredFlagTime = 0;

// --- Sound Engine (Web Audio API) ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playEngineSound() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(80, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.08);
  osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.15);
}

function playBoostSound() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(100, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.3);
  osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.5);
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.5);
}

function playStarSound() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

function playCountdownBeep(final) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(final ? 880 : 440, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (final ? 0.4 : 0.2));
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + (final ? 0.4 : 0.2));
}

function playWinSound() {
  ensureAudio();
  const notes = [523, 659, 784, 1047];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.12);
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime + i * 0.12);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.12 + 0.3);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime + i * 0.12);
    osc.stop(audioCtx.currentTime + i * 0.12 + 0.3);
  });
}

// --- Continuous movement (hold keys) ---
const keysDown = {};
let moveRepeatTimer = null;
const MOVE_INITIAL_DELAY = 150;
const MOVE_REPEAT_RATE = 90;
let moveRepeatCount = 0;

function getCurrentDir() {
  if (keysDown['up']) return 'up';
  if (keysDown['down']) return 'down';
  if (keysDown['left']) return 'left';
  if (keysDown['right']) return 'right';
  return null;
}

function startMoveRepeat(dir) {
  stopMoveRepeat();
  moveRepeatCount = 0;
  movePlayer(dir);
  moveRepeatTimer = setTimeout(function repeatMove() {
    const currentDir = getCurrentDir();
    if (!currentDir) { stopMoveRepeat(); return; }
    moveRepeatCount++;
    movePlayer(currentDir);
    const rate = Math.max(45, MOVE_REPEAT_RATE - moveRepeatCount * 8);
    moveRepeatTimer = setTimeout(repeatMove, rate);
  }, MOVE_INITIAL_DELAY);
}

function stopMoveRepeat() {
  if (moveRepeatTimer) { clearTimeout(moveRepeatTimer); moveRepeatTimer = null; }
  moveRepeatCount = 0;
}

// --- Maze generation (recursive backtracker) ---
function generateMaze() {
  maze = [];
  for (let y = 0; y < ROWS; y++) {
    maze[y] = [];
    for (let x = 0; x < COLS; x++) {
      maze[y][x] = { top: true, right: true, bottom: true, left: true, visited: false };
    }
  }

  const stack = [];
  let current = { x: 0, y: 0 };
  maze[0][0].visited = true;
  let visitedCount = 1;
  const total = COLS * ROWS;

  while (visitedCount < total) {
    const neighbors = [];
    const { x, y } = current;
    if (y > 0 && !maze[y-1][x].visited) neighbors.push({ x, y: y-1, dir: 'top' });
    if (x < COLS-1 && !maze[y][x+1].visited) neighbors.push({ x: x+1, y, dir: 'right' });
    if (y < ROWS-1 && !maze[y+1][x].visited) neighbors.push({ x, y: y+1, dir: 'bottom' });
    if (x > 0 && !maze[y][x-1].visited) neighbors.push({ x: x-1, y, dir: 'left' });

    if (neighbors.length > 0) {
      const next = neighbors[Math.floor(Math.random() * neighbors.length)];
      stack.push(current);
      if (next.dir === 'top') { maze[y][x].top = false; maze[next.y][next.x].bottom = false; }
      if (next.dir === 'right') { maze[y][x].right = false; maze[next.y][next.x].left = false; }
      if (next.dir === 'bottom') { maze[y][x].bottom = false; maze[next.y][next.x].top = false; }
      if (next.dir === 'left') { maze[y][x].left = false; maze[next.y][next.x].right = false; }
      maze[next.y][next.x].visited = true;
      visitedCount++;
      current = { x: next.x, y: next.y };
    } else {
      current = stack.pop();
    }
  }
}

// --- Place collectable stars ---
function placeStars() {
  stars = [];
  const count = 3 + level;
  let attempts = 0;
  while (stars.length < count && attempts < 500) {
    const sx = Math.floor(Math.random() * COLS);
    const sy = Math.floor(Math.random() * ROWS);
    if ((sx === 0 && sy === 0) || (sx === exit.x && sy === exit.y)) { attempts++; continue; }
    if (boostPads.some(b => b.x === sx && b.y === sy)) { attempts++; continue; }
    if (!stars.some(s => s.x === sx && s.y === sy)) {
      stars.push({ x: sx, y: sy, collected: false, sparkle: Math.random() * Math.PI * 2 });
    }
    attempts++;
  }
}

// --- Place boost pads (only on straightaways!) ---
function isStraightaway(x, y) {
  // A straightaway = open path of 2+ cells in a line (horizontal or vertical)
  const cell = maze[y][x];

  // Check horizontal: open left AND right (no walls on both sides)
  if (!cell.left && !cell.right) {
    // Verify there's runway: at least 2 open cells in one direction
    let runH = 0;
    let cx = x + 1;
    while (cx < COLS && !maze[y][cx - 1].right === false) cx++; // already checked right is open
    // Count open cells to the right
    runH = 0;
    cx = x;
    while (cx < COLS - 1 && !maze[y][cx].right) { runH++; cx++; }
    // Count open cells to the left
    let runLeft = 0;
    cx = x;
    while (cx > 0 && !maze[y][cx].left) { runLeft++; cx--; }
    if (runH >= 2 || runLeft >= 2) return 'horizontal';
  }

  // Check vertical: open top AND bottom
  if (!cell.top && !cell.bottom) {
    let runDown = 0;
    let cy = y;
    while (cy < ROWS - 1 && !maze[cy][x].bottom) { runDown++; cy++; }
    let runUp = 0;
    cy = y;
    while (cy > 0 && !maze[cy][x].top) { runUp++; cy--; }
    if (runDown >= 2 || runUp >= 2) return 'vertical';
  }

  return null;
}

function placeBoostPads() {
  boostPads = [];
  const count = 2 + Math.floor(level / 2);

  // Build a list of all valid straightaway cells
  const candidates = [];
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (x === 0 && y === 0) continue;
      if (x === exit.x && y === exit.y) continue;
      if (x < 2 && y < 2) continue;
      const dir = isStraightaway(x, y);
      if (dir) candidates.push({ x, y, dir });
    }
  }

  // Shuffle and pick from candidates
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
  }

  for (let i = 0; i < candidates.length && boostPads.length < count; i++) {
    const c = candidates[i];
    // Don't place too close to another boost pad
    if (!boostPads.some(b => Math.abs(b.x - c.x) + Math.abs(b.y - c.y) < 3)) {
      boostPads.push({ x: c.x, y: c.y, dir: c.dir });
    }
  }
}

// --- Floating text (TURBO!, etc) ---
function spawnFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 1, vy: -1.5 });
}

function updateFloatingTexts() {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy;
    ft.life -= 0.02;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
}

function drawFloatingTexts() {
  floatingTexts.forEach(ft => {
    ctx.globalAlpha = ft.life;
    ctx.fillStyle = ft.color;
    ctx.font = `bold ${16 + (1 - ft.life) * 10}px 'Segoe UI', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
  });
  ctx.globalAlpha = 1;
}

// --- Particles ---
function spawnParticles(px, py, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x: px, y: py,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 1,
      color: color,
      size: Math.random() * 4 + 2
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.02;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// --- Checkered flag pattern ---
function drawCheckeredFlag() {
  if (!checkeredFlag) return;
  const elapsed = (Date.now() - checkeredFlagTime) / 1000;
  if (elapsed > 2.5) { checkeredFlag = false; return; }

  const alpha = elapsed < 0.3 ? elapsed / 0.3 : elapsed > 2 ? (2.5 - elapsed) / 0.5 : 1;
  ctx.globalAlpha = alpha * 0.85;

  const flagW = canvas.width * 0.6;
  const flagH = canvas.height * 0.35;
  const fx = (canvas.width - flagW) / 2;
  const fy = (canvas.height - flagH) / 2 - 20;
  const squareSize = flagW / 10;

  // Wave effect
  for (let row = 0; row < Math.ceil(flagH / squareSize); row++) {
    for (let col = 0; col < 10; col++) {
      const wave = Math.sin(elapsed * 4 + col * 0.5) * 4;
      const isBlack = (row + col) % 2 === 0;
      ctx.fillStyle = isBlack ? '#222' : '#fff';
      ctx.fillRect(fx + col * squareSize, fy + row * squareSize + wave, squareSize, squareSize);
    }
  }

  // "FINISH!" text
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#f5c518';
  ctx.font = 'bold 42px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 4;
  ctx.strokeText('FINISH!', canvas.width / 2, fy + flagH + 45);
  ctx.fillText('FINISH!', canvas.width / 2, fy + flagH + 45);
  ctx.globalAlpha = 1;
}

// --- Countdown overlay ---
function drawCountdown() {
  if (countdown < 0) return;

  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (countdown > 0) {
    const scale = 1 + Math.sin(Date.now() / 100) * 0.1;
    ctx.fillStyle = countdown === 1 ? '#e94560' : '#f5c518';
    ctx.font = `bold ${80 * scale}px "Segoe UI", sans-serif`;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 5;
    ctx.strokeText(countdown, canvas.width / 2, canvas.height / 2);
    ctx.fillText(countdown, canvas.width / 2, canvas.height / 2);
  } else {
    ctx.fillStyle = '#00ff64';
    ctx.font = 'bold 90px "Segoe UI", sans-serif';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 5;
    ctx.strokeText('GO!', canvas.width / 2, canvas.height / 2);
    ctx.fillText('GO!', canvas.width / 2, canvas.height / 2);
  }
  ctx.textBaseline = 'alphabetic';
}

// --- Drawing ---
function draw() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw boost pads
  boostPads.forEach(b => {
    const bpx = b.x * CELL;
    const bpy = b.y * CELL;
    const pulse = 0.5 + Math.sin(Date.now() / 200) * 0.3;

    // Glow
    const glow = ctx.createRadialGradient(bpx + CELL/2, bpy + CELL/2, 0, bpx + CELL/2, bpy + CELL/2, CELL * 0.6);
    glow.addColorStop(0, `rgba(255, 140, 0, ${pulse * 0.4})`);
    glow.addColorStop(1, 'rgba(255, 140, 0, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(bpx - CELL*0.1, bpy - CELL*0.1, CELL*1.2, CELL*1.2);

    // Pad
    ctx.fillStyle = `rgba(255, 140, 0, ${0.3 + pulse * 0.2})`;
    ctx.fillRect(bpx + 2, bpy + 2, CELL - 4, CELL - 4);

    // Arrows on boost pad (point along the straightaway)
    ctx.fillStyle = `rgba(255, 200, 50, ${pulse})`;
    ctx.font = `bold ${CELL * 0.5}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (b.dir === 'vertical') {
      // Draw vertical arrows
      ctx.save();
      ctx.translate(bpx + CELL/2, bpy + CELL/2);
      ctx.rotate(Math.PI / 2);
      ctx.fillText('»', 0, 0);
      ctx.restore();
    } else {
      ctx.fillText('»', bpx + CELL/2, bpy + CELL/2);
    }
    ctx.textBaseline = 'alphabetic';
  });

  // Draw maze walls
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 2;

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const cell = maze[y][x];
      const px = x * CELL;
      const py = y * CELL;
      if (cell.top) { ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px + CELL, py); ctx.stroke(); }
      if (cell.right) { ctx.beginPath(); ctx.moveTo(px + CELL, py); ctx.lineTo(px + CELL, py + CELL); ctx.stroke(); }
      if (cell.bottom) { ctx.beginPath(); ctx.moveTo(px, py + CELL); ctx.lineTo(px + CELL, py + CELL); ctx.stroke(); }
      if (cell.left) { ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, py + CELL); ctx.stroke(); }
    }
  }

  // Draw exit (checkered finish!)
  const exPx = exit.x * CELL;
  const exPy = exit.y * CELL;
  const sq = CELL / 4;
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.5)';
      ctx.fillRect(exPx + c * sq, exPy + r * sq, sq, sq);
    }
  }
  // Pulsing glow on top
  const exitGlow = ctx.createRadialGradient(exPx + CELL/2, exPy + CELL/2, 0, exPx + CELL/2, exPy + CELL/2, CELL * 0.6);
  exitGlow.addColorStop(0, `rgba(0, 255, 100, ${0.2 + Math.sin(Date.now() / 300) * 0.15})`);
  exitGlow.addColorStop(1, 'rgba(0, 255, 100, 0)');
  ctx.fillStyle = exitGlow;
  ctx.beginPath();
  ctx.arc(exPx + CELL/2, exPy + CELL/2, CELL * 0.6, 0, Math.PI * 2);
  ctx.fill();

  // Draw stars
  const time = Date.now() / 1000;
  stars.forEach(s => {
    if (s.collected) return;
    const sx = s.x * CELL + CELL / 2;
    const sy = s.y * CELL + CELL / 2;
    const twinkle = 0.7 + Math.sin(time * 3 + s.sparkle) * 0.3;

    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(time + s.sparkle);
    ctx.globalAlpha = twinkle;
    ctx.fillStyle = '#f5c518';
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
      const r = CELL * 0.25;
      if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
      else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
    }
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  });

  // Draw player trail (tire marks!)
  playerTrail.forEach((t, i) => {
    const alpha = (i / playerTrail.length) * 0.25;
    ctx.fillStyle = `rgba(100, 100, 100, ${alpha})`;
    const tx = t.x * CELL + CELL / 2;
    const ty = t.y * CELL + CELL / 2;
    ctx.fillRect(tx - 2, ty - 1, 4, 2);
    ctx.fillRect(tx - 2, ty + 1, 4, 2);
  });

  // Draw player (sports car!)
  const ppx = player.x * CELL + CELL / 2;
  const ppy = player.y * CELL + CELL / 2;

  ctx.save();
  ctx.translate(ppx, ppy);

  const angles = { right: 0, down: Math.PI / 2, left: Math.PI, up: -Math.PI / 2 };
  ctx.rotate(angles[player.facing] || 0);

  const S = CELL * 0.42;

  // Headlight glow
  const hlGlow = ctx.createRadialGradient(S * 0.8, 0, 0, S * 0.8, 0, S * 0.7);
  hlGlow.addColorStop(0, 'rgba(255, 255, 150, 0.25)');
  hlGlow.addColorStop(1, 'rgba(255, 255, 150, 0)');
  ctx.fillStyle = hlGlow;
  ctx.beginPath();
  ctx.arc(S * 0.8, 0, S * 0.7, 0, Math.PI * 2);
  ctx.fill();

  // Car body
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.moveTo(-S, -S * 0.5);
  ctx.lineTo(S * 0.5, -S * 0.5);
  ctx.quadraticCurveTo(S, -S * 0.4, S, 0);
  ctx.quadraticCurveTo(S, S * 0.4, S * 0.5, S * 0.5);
  ctx.lineTo(-S, S * 0.5);
  ctx.quadraticCurveTo(-S * 0.85, 0, -S, -S * 0.5);
  ctx.closePath();
  ctx.fill();

  // Windshield
  ctx.fillStyle = '#7ec8e3';
  ctx.beginPath();
  ctx.moveTo(S * 0.05, -S * 0.38);
  ctx.lineTo(S * 0.4, -S * 0.32);
  ctx.lineTo(S * 0.4, S * 0.32);
  ctx.lineTo(S * 0.05, S * 0.38);
  ctx.closePath();
  ctx.fill();

  // Racing stripe
  ctx.fillStyle = '#f5c518';
  ctx.fillRect(-S * 0.8, -S * 0.08, S * 1.2, S * 0.16);

  // Wheels
  ctx.fillStyle = '#222';
  ctx.fillRect(-S * 0.65, -S * 0.58, S * 0.3, S * 0.12);
  ctx.fillRect(-S * 0.65, S * 0.46, S * 0.3, S * 0.12);
  ctx.fillRect(S * 0.3, -S * 0.58, S * 0.3, S * 0.12);
  ctx.fillRect(S * 0.3, S * 0.46, S * 0.3, S * 0.12);

  // Headlights
  ctx.fillStyle = '#ffffaa';
  ctx.beginPath();
  ctx.arc(S * 0.85, -S * 0.25, S * 0.1, 0, Math.PI * 2);
  ctx.arc(S * 0.85, S * 0.25, S * 0.1, 0, Math.PI * 2);
  ctx.fill();

  // Tail lights
  ctx.fillStyle = '#ff3333';
  ctx.beginPath();
  ctx.arc(-S * 0.9, -S * 0.3, S * 0.08, 0, Math.PI * 2);
  ctx.arc(-S * 0.9, S * 0.3, S * 0.08, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Draw particles
  drawParticles();

  // Draw floating texts
  drawFloatingTexts();

  // Draw checkered flag overlay
  drawCheckeredFlag();

  // Draw countdown overlay (on top of everything)
  drawCountdown();
}

// --- Movement ---
function canMove(x, y, dir) {
  if (dir === 'up') return !maze[y][x].top;
  if (dir === 'down') return !maze[y][x].bottom;
  if (dir === 'left') return !maze[y][x].left;
  if (dir === 'right') return !maze[y][x].right;
  return false;
}

function movePlayer(dir) {
  if (won || countdown >= 0) return; // can't move during countdown

  player.facing = dir;

  let nx = player.x;
  let ny = player.y;

  if (dir === 'up' && canMove(player.x, player.y, 'up')) ny--;
  else if (dir === 'down' && canMove(player.x, player.y, 'down')) ny++;
  else if (dir === 'left' && canMove(player.x, player.y, 'left')) nx--;
  else if (dir === 'right' && canMove(player.x, player.y, 'right')) nx++;

  if (nx !== player.x || ny !== player.y) {
    playerTrail.push({ x: player.x, y: player.y });
    if (playerTrail.length > 30) playerTrail.shift();

    player.x = nx;
    player.y = ny;
    playEngineSound();

    // Check boost pad
    const onBoost = boostPads.find(b => b.x === player.x && b.y === player.y);
    if (onBoost) {
      playBoostSound();
      spawnFloatingText(
        player.x * CELL + CELL / 2,
        player.y * CELL,
        'TURBO!',
        '#ff8c00'
      );
      spawnParticles(player.x * CELL + CELL / 2, player.y * CELL + CELL / 2, '#ff8c00', 20);

      // Zoom forward 3 cells in current direction
      for (let i = 0; i < 3; i++) {
        let bx = player.x, by = player.y;
        if (dir === 'up' && canMove(player.x, player.y, 'up')) by--;
        else if (dir === 'down' && canMove(player.x, player.y, 'down')) by++;
        else if (dir === 'left' && canMove(player.x, player.y, 'left')) bx--;
        else if (dir === 'right' && canMove(player.x, player.y, 'right')) bx++;
        if (bx !== player.x || by !== player.y) {
          playerTrail.push({ x: player.x, y: player.y });
          if (playerTrail.length > 30) playerTrail.shift();
          player.x = bx;
          player.y = by;
          // Check for stars during boost
          stars.forEach(s => {
            if (!s.collected && s.x === player.x && s.y === player.y) {
              s.collected = true;
              starCount++;
              starsEl.textContent = starCount;
              playStarSound();
              spawnParticles(player.x * CELL + CELL / 2, player.y * CELL + CELL / 2, '#f5c518', 15);
            }
          });
        } else break; // hit a wall, stop boosting
      }
    }

    // Check star collection
    stars.forEach(s => {
      if (!s.collected && s.x === player.x && s.y === player.y) {
        s.collected = true;
        starCount++;
        starsEl.textContent = starCount;
        playStarSound();
        spawnParticles(player.x * CELL + CELL / 2, player.y * CELL + CELL / 2, '#f5c518', 15);
        msgEl.textContent = '⭐ Got a star!';
        setTimeout(() => { if (!won) msgEl.textContent = ''; }, 1000);
      }
    });

    // Check exit
    if (player.x === exit.x && player.y === exit.y) {
      winLevel();
    }
  }
}

function winLevel() {
  won = true;
  clearInterval(timerInterval);
  playWinSound();

  // Record best time
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  if (!bestTimes[level] || elapsed < bestTimes[level]) {
    bestTimes[level] = elapsed;
    bestEl.textContent = elapsed + 's';
  }

  // Checkered flag!
  checkeredFlag = true;
  checkeredFlagTime = Date.now();

  // Lots of celebration particles
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      spawnParticles(
        Math.random() * canvas.width,
        Math.random() * canvas.height,
        ['#f5c518', '#e94560', '#00ff64', '#ff8c00', '#00b4ff'][i],
        20
      );
    }, i * 200);
  }

  msgEl.textContent = `🏁 Level ${level} complete in ${elapsed}s!`;

  setTimeout(() => {
    level++;
    levelEl.textContent = level;
    startLevel();
  }, 3000);
}

// --- Countdown ---
function runCountdown(callback) {
  countdown = 3;
  playCountdownBeep(false);
  countdownTimer = setInterval(() => {
    countdown--;
    if (countdown > 0) {
      playCountdownBeep(false);
    } else if (countdown === 0) {
      playCountdownBeep(true);
      setTimeout(() => {
        countdown = -1;
        callback();
      }, 500);
      clearInterval(countdownTimer);
    }
  }, 800);
}

function startLevel() {
  won = false;
  checkeredFlag = false;
  updateGridSize();
  player = { x: 0, y: 0, facing: 'right' };
  exit = { x: COLS - 1, y: ROWS - 1 };
  playerTrail = [];
  particles = [];
  floatingTexts = [];
  generateMaze();
  placeBoostPads();
  placeStars();

  // Update best display
  if (bestTimes[level]) {
    bestEl.textContent = bestTimes[level] + 's';
  } else {
    bestEl.textContent = '--';
  }

  msgEl.textContent = level === 1 ? 'Get ready...' : `Level ${level} — bigger maze!`;

  // Countdown then start timer
  runCountdown(() => {
    msgEl.textContent = 'GO GO GO!';
    startTime = Date.now();
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timerEl.textContent = Math.floor((Date.now() - startTime) / 1000) + 's';
    }, 500);
    setTimeout(() => { if (!won) msgEl.textContent = ''; }, 1500);
  });
}

// --- Input ---
function keyToDir(key) {
  switch(key) {
    case 'ArrowUp': case 'w': case 'W': return 'up';
    case 'ArrowDown': case 's': case 'S': return 'down';
    case 'ArrowLeft': case 'a': case 'A': return 'left';
    case 'ArrowRight': case 'd': case 'D': return 'right';
  }
  return null;
}

document.addEventListener('keydown', (e) => {
  const dir = keyToDir(e.key);
  if (!dir) return;
  e.preventDefault();
  ensureAudio(); // unlock audio on first keypress
  if (keysDown[dir]) return;
  keysDown[dir] = true;
  startMoveRepeat(dir);
});

document.addEventListener('keyup', (e) => {
  const dir = keyToDir(e.key);
  if (!dir) return;
  delete keysDown[dir];
  const nextDir = getCurrentDir();
  if (nextDir) {
    startMoveRepeat(nextDir);
  } else {
    stopMoveRepeat();
  }
});

window.addEventListener('blur', () => {
  Object.keys(keysDown).forEach(k => delete keysDown[k]);
  stopMoveRepeat();
});

// --- Game loop ---
function gameLoop() {
  updateParticles();
  updateFloatingTexts();
  draw();
  requestAnimationFrame(gameLoop);
}

// --- Start ---
startLevel();
gameLoop();
</script>
